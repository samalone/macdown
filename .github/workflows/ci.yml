name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when newer commits land on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      # prism is a Git submodule (copied into Resources/ by a build phase),
      # so it must be checked out for the build to succeed.
      - name: Check out (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # The project builds on any recent stable Xcode (verified on 26.5);
      # it does not require the Xcode 27 beta used for local development.
      - name: Select the latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # pmh_parser.c is generated (gitignored), so it must be built before
      # Xcode compiles it into the app.
      - name: Build the bundled PEG highlighter
        run: make -C Dependency/peg-markdown-highlight

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      # CocoaPods has been retired: every dependency is now a Swift Package
      # (local under Packages/ or remote). Xcode resolves them from the
      # committed Package.resolved, so no `pod install` / Bundler step is
      # needed. The test target is ad-hoc signed in the project, so `test`
      # runs headless without any signing override.
      - name: Build & test
        run: |
          xcodebuild test \
            -project MacDown.xcodeproj \
            -scheme MacDown \
            -destination 'platform=macOS' \
            -onlyUsePackageVersionsFromResolvedFile \
            | xcbeautify
